<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Office energy monitor system architecture</title>
  <desc id="desc">Simulated device layer flows into a shared backend API, then the web dashboard and Discord bot read the same state for users.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#111827"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.node{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}.title{font:700 22px system-ui,sans-serif;fill:#0f172a}.body{font:500 15px system-ui,sans-serif;fill:#475569}.label{font:700 13px system-ui,sans-serif;fill:#0369a1}.line{stroke:#111827;stroke-width:4;fill:none;marker-end:url(#arrow)}.pill{fill:#e0f2fe;stroke:#7dd3fc}
    </style>
  </defs>
  <rect class="bg" width="1200" height="620" rx="28"/>
  <text x="60" y="70" class="title">Lights, Fans, Discord - Shared Backend Architecture</text>
  <text x="60" y="100" class="body">One source of truth drives both the animated dashboard and Discord bot responses.</text>

  <rect class="node" x="60" y="210" width="230" height="150" rx="18"/>
  <text x="92" y="255" class="title">Office devices</text>
  <text x="92" y="288" class="body">3 rooms</text>
  <text x="92" y="314" class="body">6 fans + 9 lights</text>
  <text x="92" y="340" class="body">status, watts, timestamps</text>

  <rect class="node" x="365" y="210" width="240" height="150" rx="18"/>
  <text x="397" y="255" class="title">Simulator</text>
  <text x="397" y="288" class="body">Dynamic state generator</text>
  <text x="397" y="314" class="body">Office-hours rules</text>
  <text x="397" y="340" class="body">Alert calculations</text>

  <rect class="node" x="680" y="210" width="240" height="150" rx="18"/>
  <text x="712" y="255" class="title">Backend API</text>
  <text x="712" y="288" class="body">GET /api/state</text>
  <text x="712" y="314" class="body">InstantDB snapshot</text>
  <text x="712" y="340" class="body">Single shared contract</text>

  <rect class="node" x="990" y="120" width="160" height="120" rx="18"/>
  <text x="1018" y="165" class="title">Dashboard</text>
  <text x="1018" y="198" class="body">SVG map</text>
  <text x="1018" y="222" class="body">charts + alerts</text>

  <rect class="node" x="990" y="330" width="160" height="120" rx="18"/>
  <text x="1018" y="375" class="title">Discord bot</text>
  <text x="1018" y="408" class="body">!status !room</text>
  <text x="1018" y="432" class="body">proactive alerts</text>

  <path class="line" d="M290 285 H350"/>
  <path class="line" d="M605 285 H665"/>
  <path class="line" d="M920 255 C955 210 952 182 978 180"/>
  <path class="line" d="M920 315 C955 360 952 388 978 390"/>

  <rect class="pill" x="690" y="430" width="230" height="44" rx="22"/>
  <text x="805" y="458" text-anchor="middle" class="label">same live JSON payload</text>
  <path class="line" d="M800 360 V418"/>

  <rect class="node" x="475" y="470" width="250" height="78" rx="16"/>
  <text x="505" y="505" class="title">User</text>
  <text x="505" y="532" class="body">Checks browser or Discord</text>
  <path class="line" d="M990 240 C890 520 770 510 740 510"/>
  <path class="line" d="M990 390 C900 545 780 530 740 520"/>
</svg>
